version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.88"

orbs:
  toolkit: jerus-org/circleci-toolkit@4.8.0

# Reusable command to set reproducible-build environment variables.
commands:
  set_repro_env:
    description: Set env vars for reproducible builds (timestamps and path remapping)
    steps:
      - run:
          name: Set reproducible-build environment
          command: |
            echo "export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$BASH_ENV"
            echo 'export CARGO_HOME=${CARGO_HOME:-/root/.cargo}' >> "$BASH_ENV"
            echo 'export RUSTFLAGS="--remap-path-prefix=$PWD=/src --remap-path-prefix=$CARGO_HOME=/cargo ${RUSTFLAGS:-}"' >> "$BASH_ENV"
            echo 'export CFLAGS="-g -O2 -fdebug-prefix-map=$PWD=/src -fmacro-prefix-map=$PWD=/src ${CFLAGS:-}"' >> "$BASH_ENV"
            echo 'export CARGO_PROFILE_RELEASE_DEBUG=true' >> "$BASH_ENV"
            source "$BASH_ENV"

jobs:
  test-suite:
    parameters:
      test-suite:
        type: string
    executor:
      name: toolkit/rust_wasi_rolling
    steps:
      - checkout
      - run: cargo +stable --version
      - set_repro_env
      - run:
          name: Running test suite <<parameters.test-suite>>
          command: "cargo +stable test -p <<parameters.test-suite>> --test compiletest"

  doc_tests:
    executor:
      name: toolkit/rust_wasi_rolling
    steps:
      - checkout
      - run: cargo +stable --version
      - set_repro_env
      - run:
          name: Run doctests for core crate
          command: cargo +stable test -p hcaptcha --doc

  run_test_program:
    parameters:
      cargo_bin:
        type: string
      cargo_package:
        type: string
      cache_version:
        type: string
    executor:
      name: toolkit/rust_wasi_rolling
    steps:
      - checkout
      - run: cargo +stable --version
      - set_repro_env
      - restore_cache:
          key: << parameters.cache_version >>-{{ .Branch }}-{{ checksum "Cargo.lock" }}
      - run:
          name: Create the file if it does not exist
          command: |
            set -ex
            if [ ! -f bin/hcaptcha-cli ]; then
                cargo +stable build \
                  --release \
                  --package hcaptcha-cli
                mkdir -p bin
                cp target/release/hcaptcha-cli bin/
            fi
      - save_cache:
          name: save to cache
          paths:
            - bin
          key: << parameters.cache_version >>-{{ .Branch }}-{{ checksum "Cargo.lock" }}
      - toolkit/cargo_run:
          cargo_package: << parameters.cargo_package >>
          cargo_bin: << parameters.cargo_bin >>

workflows:
  validation:
    jobs:
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      - toolkit/required_builds_rolling:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/optional_builds:
          min_rust_version: << pipeline.parameters.min_rust_version >>
          filters:
            branches:
              ignore: main
      - toolkit/test_doc_build:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/idiomatic_rust:
          min_rust_version: << pipeline.parameters.min_rust_version >>
          lint_flags: "-A deprecated"
          filters:
            branches:
              ignore: main
      - toolkit/common_tests_rolling:
          min_rust_version: << pipeline.parameters.min_rust_version >>
      - toolkit/security:
          name: security audit only
          sonarcloud: false
          filters:
            branches:
              only:
                - main
                - /pull\/[0-9]+/
      - toolkit/security:
          name: security with sonarcloud
          context: SonarCloud
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main
      - toolkit/code_coverage:
          min_rust_version: << pipeline.parameters.min_rust_version >>
          package: hcaptcha
          filters:
            branches:
              ignore:
                - /pull\/[0-9]+/
                - main
          requires:
            - security with sonarcloud
      - test-suite:
          matrix:
            parameters:
              test-suite:
                [
                  test-suite-default,
                  test-suite-no-default,
                  test-suite-native-only,
                  test-suite-rustls-only,
                  test-suite-trace,
                  test-suite-enterprise,
                ]
      - doc_tests
      - run_test_program:
          cargo_package: test-suite-cli
          name: run_test_program-<< matrix.cargo_bin >>
          cache_version: "v1"
          matrix:
            parameters:
              cargo_bin: [long_help, no_options, short_help, simple_captcha]
      - toolkit/test_wasm:
          min_rust_version: << pipeline.parameters.min_rust_version >>
          wasm_test_path: crates/test-wasm
